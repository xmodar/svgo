name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-version:
    name: Check release tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Verify tag matches package version
        run: |
          uv run --no-project python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          cargo = tomllib.loads(pathlib.Path("Cargo.toml").read_text(encoding="utf-8"))

          package_version = pyproject["project"]["version"]
          crate_version = cargo["package"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]

          errors = []
          if package_version != crate_version:
              errors.append(
                  f"pyproject.toml version {package_version!r} does not match "
                  f"Cargo.toml version {crate_version!r}"
              )
          expected_tag = f"v{package_version}"
          if tag != expected_tag:
              errors.append(f"Tag {tag!r} does not match package version {expected_tag!r}")

          if errors:
              sys.exit("\n".join(errors))
          PY
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} python -m unittest discover -s tests

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: check-version

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Build source distribution
        run: uv build --sdist --out-dir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    name: Build ${{ matrix.python-version }} wheel (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
            python-version: "3.11"
            interpreter: python3.11
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
            python-version: "3.12"
            interpreter: python3.12
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
            python-version: "3.11"
            interpreter: python3.11
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
            python-version: "3.12"
            interpreter: python3.12
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto
            python-version: "3.11"
            interpreter: python
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto
            python-version: "3.12"
            interpreter: python
          - os: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: auto
            python-version: "3.11"
            interpreter: python
          - os: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: auto
            python-version: "3.12"
            interpreter: python
          - os: macos-15
            target: aarch64-apple-darwin
            manylinux: auto
            python-version: "3.11"
            interpreter: python
          - os: macos-15
            target: aarch64-apple-darwin
            manylinux: auto
            python-version: "3.12"
            interpreter: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --locked --out dist -i ${{ matrix.interpreter }}
          sccache: true

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - test
      - build-sdist
      - build-wheels
    environment:
      name: pypi
      url: https://pypi.org/project/svgo/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
